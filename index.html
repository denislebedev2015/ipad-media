<!DOCTYPE html>
<html>
<head>
    <title>Тест Медиасервера</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; color: #333; }
        .box { max-width: 600px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; margin-bottom: 20px; }
        button { width: 95%; padding: 15px; font-size: 18px; color: white; background: #28a745; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        #status { font-size: 18px; color: #666; margin: 20px 0; font-weight: bold; }
        video { width: 100%; max-width: 600px; background: #000; border-radius: 8px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Ручной тест медиатеки</h2>
        <p>Вставьте ссылку на страницу с видео (например, из Vimeo или Rutube):</p>
        
        <!-- Поле для ручного ввода ссылки -->
        <input type="text" id="videoUrlInput" placeholder="https://vimeo.com... или любой другой сайт">
        <button id="sendBtn">Запустить разбор ссылки</button>

        <div id="status">Ожидание ввода ссылки...</div>
        
        <!-- Скрытый плеер, который покажется при успехе -->
        <video id="myPlayer" controls playsinline></video>
    </div>

    <script>
        function doManualTest() {
            var inputField = document.getElementById('videoUrlInput');
            var statusDiv = document.getElementById('status');
            var player = document.getElementById('myPlayer');
            
            var videoUrl = inputField.value.trim();
            
            if (!videoUrl) {
                statusDiv.innerText = 'Ошибка: Поле ввода пустое!';
                return;
            }

            statusDiv.innerText = 'Отправка запроса на Hugging Face...';
            player.style.display = 'none'; // Скрываем плеер на время загрузки

            // AJAX запрос к вашему облаку Hugging Face
            var xhr = new XMLHttpRequest();
            var hfServerUrl = 'https://hf.space' + encodeURIComponent(videoUrl);
            
            xhr.open('GET', hfServerUrl, true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var directVideoLink = xhr.responseText.trim();
                        
                        // Проверяем, вернул ли сервер хоть что-то похожее на ссылку
                        if (directVideoLink.indexOf('http') === 0) {
                            statusDiv.innerHTML = '<span style="color:green;">Успех! Видеофайл найден.</span>';
                            
                            // Загружаем ссылку в плеер и показываем его
                            player.src = directVideoLink;
                            player.style.display = 'block';
                            player.play();
                        } else {
                            statusDiv.innerHTML = '<span style="color:red;">Сервер вернул ошибку: ' + directVideoLink + '</span>';
                        }
                    } else {
                        statusDiv.innerHTML = '<span style="color:red;">Сбой сети. Код ошибки: ' + xhr.status + '. Возможно, сервер Hugging Face "спит" или заблокирован.</span>';
                    }
                }
            };
            xhr.send();
        }

        // Привязываем клик по кнопке на чистом ES5
        window.onload = function() {
            document.getElementById('sendBtn').onclick = doManualTest;
        };
    </script>
</body>
</html>
